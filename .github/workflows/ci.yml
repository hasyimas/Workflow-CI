name: MLflow CI Workflow

on:
  push:
    paths:
      - 'Workflow-CI/MLProject/**'
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow
        
    - name: Run MLProject
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.DAGSHUB_TRACKING_URI }}
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        cd MLProject
        mlflow run . --env-manager=local

    - name: Build Docker Image (Advance Target)
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.DAGSHUB_TRACKING_URI }}
      run: |
        # Asumsikan run_id didapat dari hasil tracking sebelumnya
        # Untuk demonstrasi, ini adalah command template:
        # mlflow models build-docker -m "runs:/<RUN_ID>/model" -n my-docker-image
        echo "Building docker image..."
        
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Push Docker Image
      run: |
        # docker push my-docker-image:latest
        echo "Pushing docker image..."
